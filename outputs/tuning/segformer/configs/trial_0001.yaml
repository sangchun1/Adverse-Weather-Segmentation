experiment:
  name: trial_0001
  group: model_tuning
seed: 42
data:
  root: .
  split_dir: data/splits
  train_csv: train.csv
  val_csv: val.csv
  test_csv: test.csv
  input_width: 1024
  input_height: 512
  num_classes: 19
  ignore_index: 255
  mean:
  - 0.485
  - 0.456
  - 0.406
  std:
  - 0.229
  - 0.224
  - 0.225
  class_names:
  - road
  - sidewalk
  - building
  - wall
  - fence
  - pole
  - traffic light
  - traffic sign
  - vegetation
  - terrain
  - sky
  - person
  - rider
  - car
  - truck
  - bus
  - train
  - motorcycle
  - bicycle
model:
  name: segformer
  pretrained_name: nvidia/segformer-b2-finetuned-cityscapes-1024-1024
  num_classes: 19
  dropout: 0.2
  drop_path_rate: 0.2
  freeze_mode: freeze_s12
  train_norm_when_frozen: true
  align_corners: false
  ignore_mismatched_sizes: false
loss:
  name: ce_tversky
  ignore_index: 255
  ce_weight: 1.0
  dice_weight: 1.0
  alpha: 0.3
  beta: 0.7
  smooth: 1.0
optimizer:
  name: adamw
  lr: 6.0e-05
  use_layerwise_lr: true
  encoder_lr_mult: 0.5
  head_lr_mult: 1.0
  weight_decay: 0.01
scheduler:
  name: poly
  power: 1.0
  eta_min: 0.0
  min_lr: 0.0
  warmup_epochs: 3
train:
  epochs: 20
  batch_size: 4
  num_workers: 4
  pin_memory: true
  amp: true
  grad_clip_norm: null
  log_interval: 20
  val_interval: 1
augmentation:
  enabled: true
  name: jitter
  basic:
    color_jitter:
      enabled: true
      prob: 0.5
      brightness: 0.2
      contrast: 0.2
      saturation: 0.1
      hue: 0.05
  weather:
    enabled: false
    mode: condition_specific
    fog:
      enabled: false
      prob: 0.0
    rain:
      enabled: false
      prob: 0.0
    snow:
      enabled: false
      prob: 0.0
    night:
      enabled: false
      prob: 0.0
enhancement:
  enabled: true
  name: clahe
  clip_limit: 2.0
  tile_grid_size:
  - 8
  - 8
  color_space: lab
  apply_to: all
  apply_conditions:
  - night
checkpoint:
  save_dir: outputs/tuning/segformer/trials/trial_0001/checkpoints
  save_best_name: best_miou.pth
  save_last_name: last.pth
  monitor: val_miou
  mode: max
early_stopping:
  enabled: true
  monitor: val_miou
  mode: max
  patience: 10
  min_delta: 0.0001
wandb:
  enabled: false
  project: adverse-weather-segmentation
  entity: null
  run_name: proposed
  tags:
  - proposed
  - segformer
  - acdc
  - adverse-weather
  notes: Proposed model with best loss, best pretrained model, best augmentation,
    and best enhancement.
  dir: outputs
evaluate:
  batch_size: 4
  num_workers: 4
  save_predictions: true
  output_dir: outputs/tuning/segformer/results/trial_0001
output:
  checkpoint_dir: outputs/tuning/segformer/trials/trial_0001/checkpoints
  result_dir: outputs/tuning/segformer/results/trial_0001
  log_dir: outputs/tuning/segformer/trials/trial_0001/logs
  visualization_dir: outputs/tuning/segformer/visualizations/trial_0001
  analysis_dir: outputs/tuning/segformer/analysis/trial_0001
