# Final model 설정
# 최종 best 조합을 통합한 config

experiment:
  name: final
  group: final

seed: 42

data:
  root: "."
  split_dir: "data/splits"
  train_csv: "train.csv"
  val_csv: "val.csv"
  test_csv: "test.csv"

  input_width: 1024
  input_height: 512
  num_classes: 19
  ignore_index: 255

  # ImageNet normalization
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]

  class_names:
    - road
    - sidewalk
    - building
    - wall
    - fence
    - pole
    - traffic light
    - traffic sign
    - vegetation
    - terrain
    - sky
    - person
    - rider
    - car
    - truck
    - bus
    - train
    - motorcycle
    - bicycle

model:
  name: "segformer"
  pretrained_name: "nvidia/segformer-b2-finetuned-cityscapes-1024-1024"
  num_classes: 19

  dropout: 0.1
  drop_path_rate: 0.1
  freeze_mode: "full"
  train_norm_when_frozen: true
  align_corners: false
  ignore_mismatched_sizes: false

loss:
  name: "ce_tversky"
  ignore_index: 255

  ce_weight: 1.0
  dice_weight: 1.0

  alpha: 0.3
  beta: 0.7
  smooth: 1.0

optimizer:
  name: "adamw"
  lr: 0.00006
  use_layerwise_lr: true
  encoder_lr_mult: 1.0
  head_lr_mult: 10.0
  weight_decay: 0.01

scheduler:
  name: "poly"
  power: 1.0
  eta_min: 0.0
  min_lr: 0.0
  warmup_epochs: 3

train:
  epochs: 100
  batch_size: 8
  num_workers: 4
  pin_memory: true
  amp: true
  grad_clip_norm: null
  log_interval: 20
  val_interval: 1

augmentation:
  enabled: true
  name: "jitter"

  basic:
    color_jitter:
      enabled: true
      prob: 0.5
      brightness: 0.2
      contrast: 0.2
      saturation: 0.1
      hue: 0.05

  weather:
    enabled: true
    mode: "condition_specific"

    fog:
      enabled: true
      effect: "haze"
      haze:
        prob: 0.3
        intensity_range: [0.15, 0.4]
        atmospheric_light_range: [180, 255]

    rain:
      enabled: true
      effect: "streak"
      streak:
        prob: 0.3
        streak_count_range: [150, 600]
        streak_length_range: [8, 24]
        streak_angle_range: [-25, 25]
        alpha_range: [0.1, 0.3]

    snow:
      enabled: false

    night:
      enabled: false

enhancement:
  enabled: true
  name: "gamma"
  gamma: 0.6
  apply_to: "all"
  apply_conditions: ["night"]

checkpoint:
  save_dir: "outputs/checkpoints/final"
  save_best_name: "best_miou.pth"
  save_last_name: "last.pth"
  monitor: "val_miou"
  mode: "max"

early_stopping:
  enabled: false
  monitor: "val_miou"
  mode: "max"
  patience: 15
  min_delta: 0.0001

wandb:
  enabled: true
  project: "adverse-weather-segmentation"
  entity: null
  run_name: "segformer_final"
  tags:
    - final
    - segformer
    - ce_tversky
    - jitter
    - fog_haze
    - rain_streak
    - gamma
    - acdc
    - adverse-weather
  notes: "Final model with SegFormer, CE+Tversky loss, color jitter, fog/rain weather-specific augmentation, and night gamma enhancement."
  dir: "outputs"

evaluate:
  batch_size: 4
  num_workers: 0
  save_predictions: true
  output_dir: "outputs/results/final"

output:
  checkpoint_dir: "outputs/checkpoints/final"
  result_dir: "outputs/results/final"
  log_dir: "outputs/logs/final"
  visualization_dir: "outputs/visualizations/final"
