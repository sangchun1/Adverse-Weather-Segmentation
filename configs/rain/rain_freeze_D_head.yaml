seed: 42
data:
  root: .
  split_dir: data/splits
  train_csv: train.csv
  val_csv: val.csv
  test_csv: test.csv
  input_width: 1024
  input_height: 512
  num_classes: 19
  ignore_index: 255
  mean:
  - 0.485
  - 0.456
  - 0.406
  std:
  - 0.229
  - 0.224
  - 0.225
  class_names:
  - road
  - sidewalk
  - building
  - wall
  - fence
  - pole
  - traffic light
  - traffic sign
  - vegetation
  - terrain
  - sky
  - person
  - rider
  - car
  - truck
  - bus
  - train
  - motorcycle
  - bicycle
model:
  name: segformer
  pretrained_name: nvidia/segformer-b2-finetuned-cityscapes-1024-1024
  num_classes: 19
  pretrained: true
  dropout: null
  drop_path_rate: null
  freeze_mode: head_only
  train_norm_when_frozen: false
  align_corners: false
loss:
  name: cross_entropy
optimizer:
  name: adamw
  encoder_lr: 6.0e-05
  head_lr: 0.0006
  weight_decay: 0.01
  lr: 6.0e-05
scheduler:
  name: poly
  power: 1.0
  warmup_epochs: 5
  min_factor: 0.0
train:
  epochs: 100
  batch_size: 4
  num_workers: 4
  pin_memory: true
  amp: true
  grad_clip_norm: null
  log_interval: 20
  val_interval: 1
checkpoint:
  save_dir: outputs/checkpoints/segformer_rain_freeze_D_head
  save_best_name: best_miou.pth
  save_last_name: last.pth
  monitor: val_miou
  mode: max
early_stopping:
  enabled: true
  monitor: val_miou
  mode: max
  patience: 15
  min_delta: 0.0001
wandb:
  enabled: true
  project: adverse-weather-segmentation
  entity: null
  run_name: segformer_b2_rain_freeze_D_head
  tags:
  - acdc
  - b2
  - freeze_D_head
  - full_ft
  - rain
  - segformer
  notes: SegFormer-b2 full fine-tuning baseline on ACDC rain, 1024x512, CE loss, poly
    schedule.
  dir: outputs
evaluate:
  batch_size: 4
  num_workers: 4
  save_predictions: false
  output_dir: outputs/results/segformer_rain_freeze_D_head
