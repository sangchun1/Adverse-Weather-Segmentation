# Proposed model 설정
# 최종 best 조합을 통합하기 위한 config
# Model / Loss / Augmentation / Enhancement 값은 실험 결과에 따라 수정

experiment:
  name: proposed_baseline
  group: proposed

seed: 42

data:
  root: "."
  split_dir: "data/splits"
  train_csv: "train.csv"
  val_csv: "val.csv"
  test_csv: "test.csv"

  input_width: 1024
  input_height: 512
  num_classes: 19
  ignore_index: 255

  # ImageNet normalization
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]

  class_names:
    - road
    - sidewalk
    - building
    - wall
    - fence
    - pole
    - traffic light
    - traffic sign
    - vegetation
    - terrain
    - sky
    - person
    - rider
    - car
    - truck
    - bus
    - train
    - motorcycle
    - bicycle

model:
  name: "segformer"
  pretrained_name: "nvidia/segformer-b2-finetuned-cityscapes-1024-1024"
  num_classes: 19

  dropout: 0.1
  drop_path_rate: 0.1

  # tuning 후 best 값으로 수정
  # full       : freeze 없음
  # freeze_s1  : stage 1 freeze
  # freeze_s12 : stage 1, 2 freeze
  # freeze_s123: stage 1, 2, 3 freeze
  # head_only  : encoder 전체 freeze, decode head만 학습
  freeze_mode: "full"

  train_norm_when_frozen: true
  align_corners: false
  ignore_mismatched_sizes: false

loss:
  name: "cross_entropy"
  ignore_index: 255

optimizer:
  name: "adamw"
  lr: 0.00006

  # SegFormer param_groups에서 사용
  # tuning 후 best 값으로 수정
  use_layerwise_lr: true
  encoder_lr_mult: 1.0
  head_lr_mult: 10.0

  weight_decay: 0.01

scheduler:
  name: "poly"
  power: 1.0
  eta_min: 0.0
  min_lr: 0.0
  warmup_epochs: 3

train:
  epochs: 100
  batch_size: 8
  num_workers: 4
  pin_memory: true
  amp: true
  grad_clip_norm: null
  log_interval: 20
  val_interval: 1

augmentation:
  enabled: false
  name: none

enhancement:
  enabled: false
  name: none

  apply_to: "all"
  apply_conditions: "all"

checkpoint:
  save_dir: "outputs/checkpoints/proposed_baseline"
  save_best_name: "best_miou.pth"
  save_last_name: "last.pth"
  monitor: "val_miou"
  mode: "max"

early_stopping:
  enabled: true
  monitor: "val_miou"
  mode: "max"
  patience: 15
  min_delta: 0.0001

wandb:
  enabled: true
  project: "adverse-weather-segmentation"
  entity: null
  run_name: "segformer_proposed_baseline"
  tags:
    - proposed
    - segformer
    - cross_entropy
    - acdc
    - adverse-weather
  notes: "Proposed model with cross-entropy loss, pretrained model, no augmentation, and no enhancement."
  dir: "outputs"

evaluate:
  batch_size: 4
  num_workers: 0
  save_predictions: true
  output_dir: "outputs/results/proposed_baseline"

output:
  checkpoint_dir: "outputs/checkpoints/proposed_baseline"
  result_dir: "outputs/results/proposed_baseline"
  log_dir: "outputs/logs/proposed_baseline"
  visualization_dir: "outputs/visualizations/proposed_baseline"