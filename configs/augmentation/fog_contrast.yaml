experiment:
  name: augmentation_fog_contrast
  group: augmentation

augmentation:
  enabled: true
  name: fog_contrast

  basic:
    color_jitter:
      enabled: false

  weather:
    enabled: true
    mode: target_condition
    target: fog
    effect: contrast

    fog:
      enabled: true

      contrast:
        prob: 0.3
        contrast_factor_range: [0.65, 0.95]
