# 베이스라인 설정
# Model: U-Net from scratch

seed: 42

data:
  root: "."
  split_dir: "data/splits"
  train_csv: "train.csv"
  val_csv: "val.csv"
  test_csv: "test.csv"

  input_width: 1024
  input_height: 512
  num_classes: 19
  ignore_index: 255

  # ImageNet normalization
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]

  class_names:
    - road
    - sidewalk
    - building
    - wall
    - fence
    - pole
    - traffic light
    - traffic sign
    - vegetation
    - terrain
    - sky
    - person
    - rider
    - car
    - truck
    - bus
    - train
    - motorcycle
    - bicycle

model:
  name: "unet"
  in_channels: 3
  num_classes: 19
  base_channels: 64

loss:
  name: "tversky"  # Tversky Loss 단독 사용
  alpha: 0.3       # 오탐(False Positive) 페널티 비중
  beta: 0.7        # 미탐(False Negative) 페널티 비중 (오토바이, 사람 등 작은 객체를 놓치는 것에 강력한 페널티 부여)

optimizer:
  name: "adamw"
  lr: 0.001
  weight_decay: 0.0001

scheduler:
  name: "cosine_annealing"
  T_max: 50
  eta_min: 0.000001

train:
  epochs: 50
  batch_size: 8
  num_workers: 4
  pin_memory: true
  amp: true
  grad_clip_norm: null
  log_interval: 20
  val_interval: 1

augmentation:
  enabled: false
  name: "none"

enhancement:
  enabled: false
  name: "none"

checkpoint:
  save_dir: "outputs/checkpoints/unet_tversky" # 폴더명 변경
  save_best_name: "best_miou.pth"
  save_last_name: "last.pth"
  monitor: "val_miou"
  mode: "max"

early_stopping:
  enabled: true
  monitor: "val_miou"
  mode: "max"
  patience: 10
  min_delta: 0.0001

wandb:
  enabled: true
  project: "adverse-weather-segmentation"
  entity: null
  run_name: "unet_tversky_a0.3_b0.7" # 네이밍 변경
  tags:
    - baseline
    - unet
    - tversky
  notes: "U-Net from scratch baseline with Tversky Loss (alpha=0.3, beta=0.7) to target small objects."
  dir: "outputs"

evaluate:
  batch_size: 8
  num_workers: 4
  save_predictions: true 
  output_dir: "outputs/checkpoints/unet_tversky" # 결과 마스크 이미지가 저장될 경로 변경
