# Proposed model 설정
# 최종 best 조합을 통합하기 위한 config
# Model / Loss / Augmentation / Enhancement 값은 실험 결과에 따라 수정

experiment:
  name: proposed
  group: proposed

seed: 42

data:
  root: "."
  split_dir: "data/splits"
  train_csv: "train.csv"
  val_csv: "val.csv"
  test_csv: "test.csv"

  input_width: 1024
  input_height: 512
  num_classes: 19
  ignore_index: 255

  # ImageNet normalization
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]

  class_names:
    - road
    - sidewalk
    - building
    - wall
    - fence
    - pole
    - traffic light
    - traffic sign
    - vegetation
    - terrain
    - sky
    - person
    - rider
    - car
    - truck
    - bus
    - train
    - motorcycle
    - bicycle

model:
  name: "segformer"
  pretrained_name: "nvidia/segformer-b2-finetuned-cityscapes-1024-1024"
  num_classes: 19

  dropout: 0.1
  drop_path_rate: 0.1

  # tuning 후 best 값으로 수정
  # full       : freeze 없음
  # freeze_s1  : stage 1 freeze
  # freeze_s12 : stage 1, 2 freeze
  # freeze_s123: stage 1, 2, 3 freeze
  # head_only  : encoder 전체 freeze, decode head만 학습
  freeze_mode: "full"

  train_norm_when_frozen: true
  align_corners: false
  ignore_mismatched_sizes: false

loss:
  # loss test 후 best loss로 수정
  name: "ce_tversky"
  ignore_index: 255

  # hybrid loss 후보들이 공통으로 참조할 수 있는 기본값
  ce_weight: 1.0
  dice_weight: 1.0

  alpha: 0.3
  beta: 0.7
  smooth: 1.0

optimizer:
  name: "adamw"
  lr: 0.00006

  # SegFormer param_groups에서 사용
  # tuning 후 best 값으로 수정
  use_layerwise_lr: true
  encoder_lr_mult: 1.0
  head_lr_mult: 10.0

  weight_decay: 0.01

scheduler:
  name: "poly"
  power: 1.0
  eta_min: 0.0
  min_lr: 0.0
  warmup_epochs: 3

train:
  epochs: 100
  batch_size: 8
  num_workers: 4
  pin_memory: true
  amp: true
  grad_clip_norm: null
  log_interval: 20
  val_interval: 1

augmentation:
  # augmentation test 후 best 조합으로 수정
  enabled: true
  name: "jitter"

  basic:
    color_jitter:
      enabled: true
      prob: 0.5
      brightness: 0.2
      contrast: 0.2
      saturation: 0.1
      hue: 0.05

  weather:
    enabled: false
    mode: "condition_specific"

    fog:
      enabled: false
      prob: 0.0

    rain:
      enabled: false
      prob: 0.0

    snow:
      enabled: false
      prob: 0.0

    night:
      enabled: false
      prob: 0.0

enhancement:
  # enhancement test 후 best enhancement로 수정
  enabled: true
  name: "clahe"

  clip_limit: 2.0
  tile_grid_size: [8, 8]
  color_space: "lab"

  apply_to: "all"
  apply_conditions: ["night"]

checkpoint:
  save_dir: "outputs/checkpoints/proposed"
  save_best_name: "best_miou.pth"
  save_last_name: "last.pth"
  monitor: "val_miou"
  mode: "max"

early_stopping:
  enabled: true
  monitor: "val_miou"
  mode: "max"
  patience: 15
  min_delta: 0.0001

wandb:
  enabled: true
  project: "adverse-weather-segmentation"
  entity: null
  run_name: "segformer_proposed"
  tags:
    - proposed
    - segformer
    - ce_tversky
    - jitter
    - clahe
    - acdc
    - adverse-weather
  notes: "Proposed model with best loss, best pretrained model, best augmentation, and best enhancement."
  dir: "outputs"

evaluate:
  batch_size: 8
  num_workers: 0
  save_predictions: true
  output_dir: "outputs/results/proposed"

output:
  checkpoint_dir: "outputs/checkpoints/proposed"
  result_dir: "outputs/results/proposed"
  log_dir: "outputs/logs/proposed"
  visualization_dir: "outputs/visualizations/proposed"