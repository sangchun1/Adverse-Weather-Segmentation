experiment:
  name: model_unet
  group: model

model:
  name: "unet"
  in_channels: 3
  num_classes: 19
  base_channels: 64
  bilinear: true

optimizer:
  name: "adamw"
  lr: 0.001
  weight_decay: 0.0001
  use_layerwise_lr: false

scheduler:
  name: "cosine_annealing"
  T_max: 50
  eta_min: 0.000001

train:
  epochs: 50
  batch_size: 8
  num_workers: 4
  pin_memory: true
  amp: true
  grad_clip_norm: null
  log_interval: 20
  val_interval: 1